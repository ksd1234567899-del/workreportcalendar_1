<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>근무보고 스마트 캘린더</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Noto Sans KR & Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-tap-highlight-color: transparent;
        }
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased bg-slate-50 text-slate-800 selection:bg-indigo-500 selection:text-white pb-8">

    <header class="sticky top-0 z-40 bg-white/95 backdrop-blur-md border-b border-slate-200/80 shadow-xs">
        <div class="max-w-md mx-auto px-4 py-2.5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-2xl bg-indigo-600 text-white flex items-center justify-center text-lg shadow-md shrink-0">
                    <i class="fa-solid fa-calendar-check"></i>
                </div>
                <div class="space-y-0.5">
                    <!-- 헤더 타이틀을 고정 텍스트로 변경 -->
                    <h1 class="font-black text-sm text-slate-900 tracking-tight" id="headerDateTitle">근무보고 캘린더</h1>
                    <p class="text-[10px] font-medium text-slate-400 leading-tight">간편 시간 작성 · 자동 계산 · 보고서 생성</p>
                </div>
            </div>

            <button id="todayBtn" class="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs font-bold rounded-lg transition flex items-center gap-1.5">
                <i class="fa-solid fa-rotate-left text-[10px]"></i> 오늘
            </button>
        </div>

        <!-- Sticky Navigation Segmented Bar -->
        <div class="bg-white/90 border-t border-slate-100 px-3.5 py-1.5">
            <div class="max-w-md mx-auto grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-lg text-xs font-bold text-center">
                <button id="navTabCalendar" onclick="scrollToSection('section-calendar')" class="py-1.5 rounded-md bg-indigo-600 text-white shadow-2xs transition flex items-center justify-center gap-1">
                    <i class="fa-regular fa-calendar"></i> 캘린더
                </button>
                <button id="navTabEditor" onclick="scrollToSection('section-editor')" class="py-1.5 rounded-md text-slate-600 hover:text-slate-900 transition flex items-center justify-center gap-1">
                    <i class="fa-regular fa-clock"></i> 시간 작성
                </button>
                <button id="navTabReport" onclick="scrollToSection('section-report')" class="py-1.5 rounded-md text-slate-600 hover:text-slate-900 transition flex items-center justify-center gap-1">
                    <i class="fa-regular fa-paper-plane"></i> 보고서
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-3.5 py-3.5 flex-grow w-full space-y-3.5">
        
        <!-- Removed App Title Card -->

        <section id="section-calendar" class="scroll-mt-28 bg-white rounded-2xl border border-slate-200/80 p-4 shadow-2xs space-y-3">
            <!-- Calendar Controls Header -->
            <div class="flex items-center justify-between pb-2 border-b border-slate-100">
                <button id="monthDisplayBtn" onclick="openMonthPickerModal()" 
                    class="font-black text-slate-900 text-sm hover:text-indigo-600 transition flex items-center gap-1">
                    <i class="fa-solid fa-calendar-days text-indigo-500 text-xs mr-0.5"></i>
                    <span id="monthDisplayLabel">2026년 7월</span>
                    <span class="text-xs text-slate-400">▾</span>
                </button>

                <div class="flex items-center gap-1">
                    <button onclick="navigateMonth(-1)" aria-label="이전달" class="w-7 h-7 flex items-center justify-center text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition font-bold">
                        <i class="fa-solid fa-chevron-left text-xs"></i>
                    </button>
                    <button onclick="navigateMonth(1)" aria-label="다음달" class="w-7 h-7 flex items-center justify-center text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg transition font-bold">
                        <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- Weekday Labels -->
            <div class="grid grid-cols-7 gap-1 text-center font-semibold text-[11px] text-slate-400 pt-1">
                <span class="text-rose-500">일</span>
                <span>월</span>
                <span>화</span>
                <span>수</span>
                <span>목</span>
                <span>금</span>
                <span class="text-indigo-600">토</span>
            </div>

            <!-- Days Grid -->
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center text-xs">
                <!-- Dynamic Calendar Cells -->
            </div>
        </section>

        <section id="section-editor" class="scroll-mt-28 bg-white rounded-2xl border border-slate-200/80 p-4 shadow-2xs space-y-3.5">
            
            <!-- Header & Selected Date Title (Enlarged & Highlighted) -->
            <div class="flex items-center justify-between pb-3 border-b border-slate-100">
                <div class="flex items-center gap-2">
                    <div id="selectedDateIndicator" class="w-2.5 h-2.5 rounded-full bg-indigo-600 animate-pulse"></div>
                    <span id="selectedDateTitle" class="text-base sm:text-lg font-black text-slate-900 tracking-tight"></span>
                </div>

                <div class="flex items-center gap-1.5">
                    <button id="verseToggleBtn" onclick="toggleVerseMode()" class="px-2.5 py-1 text-xs font-bold rounded-xl transition border bg-slate-100 text-slate-600 border-slate-200 hover:bg-rose-50 hover:text-rose-600 flex items-center gap-1">
                        <i class="fa-solid fa-bolt text-[10px]"></i> 벌스
                    </button>
                    <button id="clearDayBtn" class="px-2 py-1 text-slate-400 hover:text-rose-600 text-xs font-semibold rounded-xl hover:bg-rose-50 transition flex items-center gap-1">
                        <i class="fa-regular fa-trash-can text-[11px]"></i> 초기화
                    </button>
                </div>
            </div>

            <!-- Verse Banner Indicator -->
            <div id="verseNoticeBanner" class="hidden bg-rose-50 border border-rose-200 rounded-xl p-2.5 text-xs text-rose-700 flex items-center justify-between font-medium">
                <div class="flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>
                    <span><strong>벌스:</strong> 새벽 근로 포함 시 AM 9:30부터 기본 근무 계산</span>
                </div>
            </div>

            <div class="space-y-3">
                <!-- 1. Daily Schedule Note -->
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1 flex items-center gap-1">
                        <i class="fa-regular fa-pen-to-square text-indigo-500"></i> 당일 일정
                    </label>
                    <input type="text" id="summaryNoteInput" 
                        placeholder="예: 정원-박진영댄서 출장 후 유노윤호 출장 연결" 
                        class="w-full text-xs font-medium px-3 py-2.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition placeholder:text-slate-300 [&:not(:placeholder-shown)]:bg-indigo-50/50 [&:not(:placeholder-shown)]:border-indigo-100 [&:not(:placeholder-shown)]:text-indigo-950">
                </div>

                <!-- 2. Daily Overtime Input Box (With Clock Icon Button) -->
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-1 flex items-center gap-1">
                        <i class="fa-regular fa-clock text-indigo-500"></i> 당일 초과근무 (+시간)
                    </label>
                    <div class="relative flex items-center">
                        <input type="text" id="extraTimeInput" 
                            placeholder="예: 2시간 30분 또는 2시간" 
                            class="w-full text-xs font-medium px-3 py-2.5 rounded-xl border border-slate-200 bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition placeholder:text-slate-300 pr-10 [&:not(:placeholder-shown)]:bg-indigo-50/80 [&:not(:placeholder-shown)]:border-indigo-200/80 [&:not(:placeholder-shown)]:text-indigo-950">
                        <button type="button" onclick="openExtraTimePickerModal()" title="시간 선택" class="absolute right-1.5 p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 active:bg-indigo-100 rounded-lg transition flex items-center justify-center">
                            <i class="fa-regular fa-clock text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Quick Preset Chips Bar -->
            <div class="pt-1">
                <span class="block text-xs font-bold text-slate-700 mb-2 flex items-center gap-1">
                    <i class="fa-solid fa-plus-circle text-indigo-500"></i> 시간 항목 추가
                </span>
                <div class="flex flex-wrap gap-1.5 text-xs font-medium">
                    <button onclick="addPresetEvent('출근시간', 'AM12:00')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs rounded-xl transition font-medium flex items-center gap-1">출근</button>
                    <button onclick="addPresetEvent('휴식시간', 'AM12:00-PM12:00')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs rounded-xl transition font-medium flex items-center gap-1">휴식</button>
                    <button onclick="addPresetEvent('재출근시간', 'AM12:00')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs rounded-xl transition font-medium flex items-center gap-1">재출근</button>
                    <button onclick="addPresetEvent('출발시간', 'AM12:00')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs rounded-xl transition font-medium flex items-center gap-1">출발</button>
                    <button onclick="addPresetEvent('종료시간', 'AM12:00')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs rounded-xl transition font-medium flex items-center gap-1">종료</button>
                    <button onclick="addPresetEvent('복귀시간', 'AM12:00')" class="px-2.5 py-1.5 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 text-xs rounded-xl transition font-medium flex items-center gap-1">복귀</button>
                    <button onclick="addCustomEvent()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs rounded-xl transition font-bold shadow-2xs flex items-center gap-1"><i class="fa-solid fa-plus text-[10px]"></i> 직접입력</button>
                </div>
            </div>

            <!-- Event Timeline Container -->
            <div id="eventsList" class="space-y-2 max-h-[300px] overflow-y-auto pt-1">
                <!-- Dynamic Event Items -->
            </div>
        </section>

        <section id="section-report" class="scroll-mt-28 bg-slate-900 text-slate-100 rounded-2xl p-4 shadow-md space-y-3">
            <div class="flex items-center justify-between pb-2 border-b border-slate-800">
                <span class="text-xs font-bold text-slate-200 flex items-center gap-1.5">
                    <i class="fa-regular fa-paper-plane text-indigo-400"></i> 근무보고
                </span>
                <button id="copyReportBtn" onclick="copyFormattedReport()" class="px-3 py-1 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white text-xs font-bold rounded-xl transition shadow-2xs flex items-center gap-1">
                    <i class="fa-regular fa-copy text-[11px]"></i> 복사하기
                </button>
            </div>

            <textarea id="formattedTextOutput" 
                placeholder="근무 내용 작성 시 자동 생성됩니다."
                class="w-full p-3 bg-slate-950/80 border border-slate-800 rounded-xl font-mono text-xs text-slate-200 leading-relaxed min-h-[180px] focus:outline-none focus:ring-1 focus:ring-indigo-500 resize-y select-all"></textarea>
        </section>
    </main>

    <!-- Toast Notification Overlay -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-4 py-2.5 rounded-2xl shadow-2xl flex items-center space-x-2 transform translate-y-16 opacity-0 transition-all duration-200 z-50 pointer-events-none border border-slate-700 text-xs font-medium">
        <span id="toastMessage">클립보드에 복사되었습니다!</span>
    </div>

    <!-- Custom Time Picker Modal -->
    <div id="timePickerModal" onclick="if(event.target === this) closeTimePickerModal()" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-4 max-w-xs w-full shadow-xl border border-slate-100 space-y-3 animate-in fade-in duration-150">
            
            <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                <h3 class="font-bold text-slate-800 text-xs flex items-center gap-1"><i class="fa-regular fa-clock text-indigo-600"></i> 시간 설정</h3>
                <span id="tpLivePreview" class="text-xs font-mono font-bold text-indigo-600">AM12:00</span>
            </div>

            <!-- Single vs Range Switcher -->
            <div class="grid grid-cols-2 gap-1 bg-slate-100 p-1 rounded-xl text-xs font-medium text-center">
                <button id="tpModeSingleBtn" onclick="setTimePickerMode('single')" class="py-1 rounded-lg bg-white text-slate-800 font-bold shadow-2xs">단일 시간</button>
                <button id="tpModeRangeBtn" onclick="setTimePickerMode('range')" class="py-1 rounded-lg text-slate-500 hover:text-slate-800">범위 시간</button>
            </div>

            <!-- Range Sub-Tabs -->
            <div id="tpRangeTabsContainer" class="hidden grid-cols-2 gap-1.5 text-xs">
                <button id="tpSubTabStart" onclick="setActiveRangeSubTab('start')" class="py-1.5 rounded-xl bg-indigo-50 text-indigo-700 font-bold font-mono text-center border border-indigo-200">
                    시작: <span id="tpStartPreviewText">AM12:00</span>
                </button>
                <button id="tpSubTabEnd" onclick="setActiveRangeSubTab('end')" class="py-1.5 rounded-xl bg-slate-50 text-slate-500 font-mono text-center border border-slate-200">
                    종료: <span id="tpEndPreviewText">PM12:00</span>
                </button>
            </div>

            <!-- AM / PM Switcher -->
            <div class="grid grid-cols-2 gap-1.5">
                <button id="tpAmBtn" onclick="setTimePickerPeriod('AM')" class="py-1.5 rounded-xl bg-indigo-600 text-white font-bold text-xs">오전 (AM)</button>
                <button id="tpPmBtn" onclick="setTimePickerPeriod('PM')" class="py-1.5 rounded-xl bg-slate-100 text-slate-700 font-bold text-xs">오후 (PM)</button>
            </div>

            <!-- Hours Grid -->
            <div>
                <span class="block text-[11px] font-semibold text-slate-400 mb-1">시 (Hour)</span>
                <div id="tpHoursGrid" class="grid grid-cols-4 gap-1 text-xs font-mono"></div>
            </div>

            <!-- Minutes Grid -->
            <div>
                <span class="block text-[11px] font-semibold text-slate-400 mb-1">분 (Minute)</span>
                <div id="tpMinutesGrid" class="grid grid-cols-4 gap-1 text-xs font-mono"></div>
            </div>

            <div class="pt-2 border-t border-slate-100 flex gap-2">
                <button onclick="closeTimePickerModal()" class="w-1/3 py-2 bg-slate-100 text-slate-600 text-xs font-semibold rounded-xl">취소</button>
                <button onclick="applyTimePickerSelection()" class="w-2/3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow-2xs">적용</button>
            </div>
        </div>
    </div>

    <!-- Custom Extra Time Picker Modal -->
    <div id="extraTimePickerModal" onclick="if(event.target === this) closeExtraTimePickerModal()" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-4 max-w-xs w-full shadow-xl border border-slate-100 space-y-3.5">
            <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                <h3 class="font-bold text-slate-800 text-xs">초과근무시간 선택</h3>
                <span id="etpLivePreview" class="text-xs font-mono font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md border border-indigo-100">0시간</span>
            </div>

            <div>
                <span class="block text-[11px] font-semibold text-slate-400 mb-1">시간 (Hour)</span>
                <div id="etpHoursGrid" class="grid grid-cols-4 gap-1 text-xs font-mono"></div>
            </div>

            <div>
                <span class="block text-[11px] font-semibold text-slate-400 mb-1">분 (Minute)</span>
                <div id="etpMinutesGrid" class="grid grid-cols-4 gap-1 text-xs font-mono max-h-[160px] overflow-y-auto p-0.5"></div>
            </div>

            <div class="pt-2 border-t border-slate-100 flex gap-2">
                <button onclick="closeExtraTimePickerModal()" class="w-1/3 py-2 bg-slate-100 text-slate-600 text-xs font-semibold rounded-xl">취소</button>
                <button onclick="applyExtraTimeSelection()" class="w-2/3 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-xl shadow-2xs">적용</button>
            </div>
        </div>
    </div>

    <!-- Custom Month Picker Modal -->
    <div id="monthPickerModal" onclick="if(event.target === this) closeMonthPickerModal()" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-4 max-w-xs w-full shadow-xl border border-slate-100 space-y-3">
            <div class="flex items-center justify-between border-b border-slate-100 pb-2">
                <button onclick="changePickerYear(-1)" class="p-1 text-slate-400 hover:text-slate-700">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
                <span id="pickerYearLabel" class="font-bold text-slate-800 text-sm">2026년</span>
                <button onclick="changePickerYear(1)" class="p-1 text-slate-400 hover:text-slate-700">
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>

            <div id="monthsGrid" class="grid grid-cols-3 gap-1.5 text-xs"></div>

            <div class="pt-2 border-t border-slate-100 flex justify-between gap-2">
                <button onclick="selectThisMonth()" class="flex-1 py-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 text-xs font-bold rounded-xl">이번 달</button>
                <button onclick="closeMonthPickerModal()" class="px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 text-xs font-semibold rounded-xl">닫기</button>
            </div>
        </div>
    </div>

    <script>
        function scrollToSection(sectionId) {
            const el = document.getElementById(sectionId);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function updateActiveTab() {
            const secCal = document.getElementById('section-calendar');
            const secEdit = document.getElementById('section-editor');
            const secRep = document.getElementById('section-report');

            const tabCal = document.getElementById('navTabCalendar');
            const tabEdit = document.getElementById('navTabEditor');
            const tabRep = document.getElementById('navTabReport');

            if (!secCal || !secEdit || !secRep || !tabCal || !tabEdit || !tabRep) return;

            const scrollPos = window.scrollY + 160;

            const inactiveStyle = "py-1.5 rounded-lg text-slate-600 hover:text-slate-900 transition";
            const activeStyle = "py-1.5 rounded-lg bg-indigo-600 text-white shadow-2xs transition";

            tabCal.className = inactiveStyle;
            tabEdit.className = inactiveStyle;
            tabRep.className = inactiveStyle;

            if (scrollPos >= secRep.offsetTop - 50) {
                tabRep.className = activeStyle;
            } else if (scrollPos >= secEdit.offsetTop - 50) {
                tabEdit.className = activeStyle;
            } else {
                tabCal.className = activeStyle;
            }
        }

        window.addEventListener('scroll', updateActiveTab);

        const todayObj = new Date();
        let currentDate = new Date(todayObj.getFullYear(), todayObj.getMonth(), 1);
        
        const initYear = todayObj.getFullYear();
        const initMonth = String(todayObj.getMonth() + 1).padStart(2, '0');
        const initDay = String(todayObj.getDate()).padStart(2, '0');
        let selectedDateKey = `${initYear}-${initMonth}-${initDay}`;

        let isUserEditingOutput = false;
        let workData = JSON.parse(localStorage.getItem("workReportCalendarData_v4") || "{}");
        let pickerYear = currentDate.getFullYear();

        // Extra Time Picker State
        let etpHours = 0;
        let etpMins = 0;

        // Time Picker State variables
        let tpActiveEventIdx = null;
        let tpMode = 'single';
        let tpActiveSubTab = 'start';
        let tpState = {
            start: { period: 'AM', hour: 12, min: 0 },
            end: { period: 'PM', hour: 12, min: 0 }
        };

        function parseTimeToMinutes(timeStr) {
            if (!timeStr || typeof timeStr !== 'string') return null;
            let str = timeStr.trim().toUpperCase();
            if (!str) return null;

            let isPM = str.includes('PM') || str.includes('오후');
            let isAM = str.includes('AM') || str.includes('오전');

            let cleanStr = str.replace(/(AM|PM|오전|오후)/gi, '').trim();
            let parts = cleanStr.split(':');
            if (parts.length < 2) return null;

            let h = parseInt(parts[0], 10);
            let m = parseInt(parts[1], 10);
            if (isNaN(h) || isNaN(m)) return null;

            if (isPM && h < 12) h += 12;
            if (isAM && h === 12) h = 0;

            return h * 60 + m;
        }

        function parseDurationToMinutes(durStr) {
            if (!durStr || typeof durStr !== 'string') return 0;
            let str = durStr.trim();
            if (!str) return 0;

            let hours = 0;
            let mins = 0;

            let hMatch = str.match(/(\d+(?:\.\d+)?)\s*시간/);
            if (hMatch) {
                let val = parseFloat(hMatch[1]);
                hours = Math.floor(val);
                mins += Math.round((val - hours) * 60);
            }

            let mMatch = str.match(/(\d+)\s*분/);
            if (mMatch) mins += parseInt(mMatch[1], 10);

            if (!hMatch && !mMatch) {
                let num = parseFloat(str);
                if (!isNaN(num)) {
                    hours = Math.floor(num);
                    mins += Math.round((num - hours) * 60);
                } else {
                    let parts = str.split(':');
                    if (parts.length === 2) {
                        let h = parseInt(parts[0], 10);
                        let m = parseInt(parts[1], 10);
                        if (!isNaN(h)) hours = h;
                        if (!isNaN(m)) mins = m;
                    }
                }
            }

            return hours * 60 + mins;
        }

        // 메모 텍스트에서 순수 내용만 추출하는 헬퍼 함수
        function cleanDetailText(str) {
            if (!str) return '';
            let cleaned = str.trim();
            cleaned = cleaned.replace(/^\(/, '').replace(/\)\*?$/, '').replace(/\*$/, '').trim();
            return cleaned;
        }

        // 새벽 근로 (AM 09:30 이전) 및 벌스 적용 여부 확인
        function isDawnVerseEvent(timeStr, isVerse) {
            if (!isVerse || !timeStr) return false;
            const parts = timeStr.split(/[-~]/);
            const parsedMin = parseTimeToMinutes(parts[0]);
            // AM 09:30 이전 (570분 미만)
            return parsedMin !== null && parsedMin < (9 * 60 + 30);
        }

        // 메모 서식 자동 생성: (메모내용) 또는 새벽벌스 시 (메모내용)*
        function formatDetailText(rawDetail, timeStr, isVerse) {
            const clean = cleanDetailText(rawDetail);
            if (!clean) return '';
            const isDawn = isDawnVerseEvent(timeStr, isVerse);
            return `(${clean})${isDawn ? '*' : ''}`;
        }

        function getWeeklyStats(dateKey) {
            const d = new Date(dateKey + 'T00:00:00');
            if (isNaN(d.getTime())) {
                return {
                    weekRangeLabel: '',
                    prevWeekCarryoverMins: 0,
                    currentWeekTotalMins: 0,
                    nextWeekCarryoverMins: 0
                };
            }

            const sun = new Date(d);
            sun.setDate(d.getDate() - d.getDay());
            const sat = new Date(sun);
            sat.setDate(sun.getDate() + 6);

            const days = ['일', '월', '화', '수', '목', '금', '토'];
            const formatShort = (dt) => `${dt.getMonth() + 1}/${dt.getDate()}(${days[dt.getDay()]})`;
            const weekRangeLabel = `${formatShort(sun)} ~ ${formatShort(sat)}`;

            // Calculate previous week carryover
            const prevSun = new Date(sun);
            prevSun.setDate(sun.getDate() - 7);
            let prevWeekExtraMins = 0;
            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(prevSun);
                dayDate.setDate(prevSun.getDate() + i);
                const k = `${dayDate.getFullYear()}-${String(dayDate.getMonth() + 1).padStart(2, '0')}-${String(dayDate.getDate()).padStart(2, '0')}`;
                prevWeekExtraMins += getDailyExtraMinutes(k);
            }
            const prevWeekCarryoverMins = Math.max(0, prevWeekExtraMins - 720);

            // Calculate current week total overtime
            let currentWeekExtraMins = 0;
            for (let i = 0; i < 7; i++) {
                const dayDate = new Date(sun);
                dayDate.setDate(sun.getDate() + i);
                const k = `${dayDate.getFullYear()}-${String(dayDate.getMonth() + 1).padStart(2, '0')}-${String(dayDate.getDate()).padStart(2, '0')}`;
                currentWeekExtraMins += getDailyExtraMinutes(k);
            }

            const currentWeekTotalMins = currentWeekExtraMins + prevWeekCarryoverMins;
            const nextWeekCarryoverMins = Math.max(0, currentWeekTotalMins - 720);

            return {
                weekRangeLabel,
                prevWeekCarryoverMins,
                currentWeekTotalMins,
                nextWeekCarryoverMins
            };
        }

        function updateWeeklyDashboard(dateKey) {
            const stats = getWeeklyStats(dateKey);

            const formatMinsToText = (mins) => {
                const h = Math.floor(mins / 60);
                const m = mins % 60;
                if (h === 0 && m === 0) return "0시간";
                if (m === 0) return `${h}시간`;
                if (h === 0) return `${m}분`;
                return `${h}시간 ${m}분`;
            };

            const prevEl = document.getElementById('prevWeekCarryoverText');
            if (prevEl) prevEl.textContent = formatMinsToText(stats.prevWeekCarryoverMins);

            const currEl = document.getElementById('currentWeekTotalText');
            if (currEl) currEl.textContent = formatMinsToText(stats.currentWeekTotalMins);

            const nextEl = document.getElementById('nextWeekCarryoverText');
            if (nextEl) nextEl.textContent = formatMinsToText(stats.nextWeekCarryoverMins);
        }

        function getDailyNetWorkMinutes(dateKey) {
            const current = workData[dateKey] || {};
            const events = current.events || [];
            const isVerse = !!current.isVerse;

            let startMin = null;
            let endMin = null;
            let totalRestMinutes = 0;

            events.forEach(ev => {
                const title = (ev.title || "").trim();
                const timeStr = (ev.time || "").trim();

                if (title.includes("휴식")) {
                    const parts = timeStr.split(/[-~]/);
                    if (parts.length === 2) {
                        let m1 = parseTimeToMinutes(parts[0]);
                        let m2 = parseTimeToMinutes(parts[1]);
                        if (m1 !== null && m2 !== null) {
                            if (m2 < m1 && !parts[1].toUpperCase().includes('PM') && !parts[1].toUpperCase().includes('AM')) {
                                m2 += 12 * 60;
                            }
                            let diff = m2 - m1;
                            if (diff < 0) diff += 24 * 60;
                            totalRestMinutes += diff;
                        }
                    }
                } else {
                    const parsed = parseTimeToMinutes(timeStr);
                    if (parsed !== null) {
                        if (startMin === null || parsed < startMin) startMin = parsed;
                        if (endMin === null || parsed > endMin) endMin = parsed;
                    }
                }
            });

            if (startMin !== null && endMin !== null) {
                let actualStart = startMin;
                // If Verse mode is ON, standard work calculation starts from AM 9:30 (570 mins)
                if (isVerse) {
                    const verseStartMin = 9 * 60 + 30; // 570 mins (09:30 AM)
                    if (actualStart < verseStartMin) {
                        actualStart = verseStartMin;
                    }
                }

                let grossMinutes = endMin - actualStart;
                if (grossMinutes < 0) grossMinutes += 24 * 60;
                return Math.max(0, grossMinutes - totalRestMinutes);
            }
            return 0;
        }

        // Returns extra minutes generated before AM 9:30 in Verse mode
        function getVerseBefore930Minutes(dateKey) {
            const current = workData[dateKey] || {};
            if (!current.isVerse) return 0;

            const events = current.events || [];
            let startMin = null;

            events.forEach(ev => {
                const title = (ev.title || "").trim();
                const timeStr = (ev.time || "").trim();

                if (!title.includes("휴식")) {
                    const parsed = parseTimeToMinutes(timeStr);
                    if (parsed !== null) {
                        if (startMin === null || parsed < startMin) startMin = parsed;
                    }
                }
            });

            const verseStartMin = 9 * 60 + 30; // 09:30 AM
            if (startMin !== null && startMin < verseStartMin) {
                return verseStartMin - startMin; // e.g. 5:15 to 9:30 = 255 mins (4h 15m)
            }
            return 0;
        }

        function getDailyExtraMinutes(dateKey) {
            const data = workData[dateKey] || {};
            let mins = parseDurationToMinutes(data.extraTime || "");
            if (data.isVerse) {
                mins += getVerseBefore930Minutes(dateKey);
            }
            return mins;
        }

        function calculateWorkDurations() {
            const current = workData[selectedDateKey] || {};
            const netWorkMinutes = getDailyNetWorkMinutes(selectedDateKey);

            let workStr = "";
            if (netWorkMinutes > 0) {
                const totalWorkHours = Math.floor(netWorkMinutes / 60);
                const totalWorkMins = netWorkMinutes % 60;
                workStr = `근무시간 ${totalWorkHours}시간 ${totalWorkMins > 0 ? totalWorkMins + '분' : ''}이고`;
            } else {
                workStr = "근무시간 0시간이고";
            }

            const dailyExtraMins = getDailyExtraMinutes(selectedDateKey);
            const stats = getWeeklyStats(selectedDateKey);
            const prevCarryMins = stats.prevWeekCarryoverMins;

            const totalReportExtraMins = dailyExtraMins + prevCarryMins;

            let extraStr = "";
            if (totalReportExtraMins > 0) {
                const h = Math.floor(totalReportExtraMins / 60);
                const m = totalReportExtraMins % 60;
                let str = "";
                if (h > 0) str += `${h}시간`;
                if (m > 0) str += `${m > 0 && h > 0 ? ' ' : ''}${m}분`;

                if (prevCarryMins > 0) {
                    const carryH = Math.floor(prevCarryMins / 60);
                    const carryM = prevCarryMins % 60;
                    let carryStr = `${carryH}시간${carryM > 0 ? ' ' + carryM + '분' : ''}`;
                    extraStr = ` (+${str} [전주 이월 ${carryStr} 포함])`;
                } else {
                    extraStr = ` (+${str})`;
                }
            } else if (current.extraTime && current.extraTime.trim()) {
                extraStr = ` (+${current.extraTime.trim()})`;
            } else {
                extraStr = " (+0시간)";
            }

            let combinedMinutes = netWorkMinutes + totalReportExtraMins;
            const grandHours = Math.floor(combinedMinutes / 60);
            const grandMins = combinedMinutes % 60;
            let totalStr = `총 근무시간 ${grandHours}시간 ${grandMins > 0 ? grandMins + '분' : ''} 입니다`;

            return {
                workStr: workStr,
                extraStr: extraStr,
                totalStr: totalStr
            };
        }

        function updateFormattedOutput() {
            if (isUserEditingOutput) return;

            updateWeeklyDashboard(selectedDateKey);
            const current = workData[selectedDateKey] || {};
            const events = current.events || [];
            const isVerse = !!current.isVerse;
            let lines = [];

            const dateObj = new Date(selectedDateKey + 'T00:00:00');
            const daysOfWeek = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            const formattedDateTitle = `${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일 ${daysOfWeek[dateObj.getDay()]}`;
            lines.push(formattedDateTitle);

            let summaryText = (current.summary || "").trim();
            if (summaryText) {
                if (isVerse) {
                    if (summaryText.endsWith('/벌스*') || summaryText.endsWith('/벌스')) {
                        lines.push(summaryText);
                    } else if (summaryText.startsWith('(') && summaryText.endsWith(')')) {
                        const inner = summaryText.slice(1, -1);
                        lines.push(`(${inner}/벌스*)`);
                    } else {
                        lines.push(`(${summaryText}/벌스*)`);
                    }
                } else {
                    lines.push(summaryText);
                }
            } else if (isVerse) {
                lines.push(`(벌스*)`);
            }

            lines.push("");

            events.forEach(ev => {
                let line = ev.title ? ev.title.trim() : "";
                if (ev.time && ev.time.trim()) {
                    line += ` ${ev.time.trim()}`;
                }
                const formattedMemo = formatDetailText(ev.detail, ev.time, isVerse);
                if (formattedMemo) {
                    line += ` ${formattedMemo}`;
                }
                lines.push(line);
            });

            const dur = calculateWorkDurations();
            lines.push("");

            if (isVerse) {
                lines.push("오늘 벌스로 AM9:30부터 체크하여");
            }

            let line1 = dur.workStr + dur.extraStr;
            lines.push(line1);

            lines.push("");
            lines.push(dur.totalStr);

            const formattedText = lines.join("\n");
            const outputEl = document.getElementById('formattedTextOutput');
            if (outputEl) {
                outputEl.value = formattedText;
            }
        }

                    : "w-full text-xs font-medium px-2 py-1.5 rounded-lg border border-indigo-200/80 bg-indigo-50/80 text-indigo-950 focus:outline-none focus:border-indigo-500 transition placeholder:text-indigo-300";

                itemEl.innerHTML = `
                    <div class="w-1/4 min-w-[70px]">
                        <input type="text" value="${escapeHtml(ev.title || '')}" 
                            oninput="updateEventField(${idx}, 'title', this.value)"
                            placeholder="항목명" 
                            class="${titleInputClass}">
                    </div>

                    <div class="w-1/3 min-w-[90px]">
                        <button type="button" onclick="openTimePickerModal(${idx})" 
                            class="${timeBtnClass}">
                            <span>${escapeHtml(ev.time || 'AM12:00')}</span>
                        </button>
                    </div>

                    <div class="flex-grow">
                        <input type="text" value="${escapeHtml(formattedMemo)}" 
                            oninput="handleDetailInput(${idx}, this.value)"
                            onblur="renderEventsList()"
                            placeholder="메모/대상" 
                            class="${memoInputClass}">
                    </div>

                    <button onclick="deleteEvent(${idx})" class="p-1.5 text-slate-400 hover:text-rose-500 rounded-lg font-bold text-xs transition">
                        ✕
                    </button>
                `;

                listEl.appendChild(itemEl);
            });
        }

        function handleDetailInput(idx, rawValue) {
            if (workData[selectedDateKey] && workData[selectedDateKey].events && workData[selectedDateKey].events[idx]) {
                const cleaned = cleanDetailText(rawValue);
                workData[selectedDateKey].events[idx].detail = cleaned;
                isUserEditingOutput = false;
                saveData();
            }
        }

        function addPresetEvent(title, defaultTime) {
            if (!workData[selectedDateKey]) workData[selectedDateKey] = { summary: "", extraTime: "", events: [] };
            if (!workData[selectedDateKey].events) workData[selectedDateKey].events = [];

            workData[selectedDateKey].events.push({
                title: title,
                time: defaultTime,
                detail: ""
            });

            isUserEditingOutput = false;
            saveData();
            renderEventsList();
        }

        function addCustomEvent() {
            addPresetEvent("직접입력", "AM12:00");
        }

        function updateEventField(idx, field, value) {
            if (workData[selectedDateKey] && workData[selectedDateKey].events && workData[selectedDateKey].events[idx]) {
                workData[selectedDateKey].events[idx][field] = value;
                isUserEditingOutput = false;
                saveData();
            }
        }

        function deleteEvent(idx) {
            if (workData[selectedDateKey] && workData[selectedDateKey].events) {
                workData[selectedDateKey].events.splice(idx, 1);
                isUserEditingOutput = false;
                saveData();
                renderEventsList();
            }
        }

        function openExtraTimePickerModal() {
            const currentVal = (workData[selectedDateKey] && workData[selectedDateKey].extraTime) || '';
            const totalMins = parseDurationToMinutes(currentVal);
            etpHours = Math.floor(totalMins / 60);
            etpMins = totalMins % 60;
            if (etpMins % 5 !== 0) etpMins = Math.round(etpMins / 5) * 5;
            if (etpMins >= 60) etpMins = 55;

            updateExtraTimePickerUI();
            document.getElementById('extraTimePickerModal')?.classList.remove('hidden');
        }

        function closeExtraTimePickerModal() {
            document.getElementById('extraTimePickerModal')?.classList.add('hidden');
        }

        function updateExtraTimePickerUI() {
            const livePreview = document.getElementById('etpLivePreview');
            if (livePreview) {
                if (etpHours === 0 && etpMins === 0) {
                    livePreview.textContent = '0시간';
                } else {
                    let str = '';
                    if (etpHours > 0) str += `${etpHours}시간 `;
                    if (etpMins > 0) str += `${etpMins}분`;
                    livePreview.textContent = str.trim();
                }
            }

            const hoursGrid = document.getElementById('etpHoursGrid');
            if (hoursGrid) {
                hoursGrid.innerHTML = '';
                for (let h = 0; h <= 12; h++) {
                    const btn = document.createElement('button');
                    const isSel = (etpHours === h);
                    btn.className = isSel
                        ? "py-1.5 rounded-lg font-bold bg-indigo-600 text-white transition text-xs"
                        : "py-1.5 rounded-lg font-medium bg-slate-100 hover:bg-indigo-50 text-slate-700 transition text-xs";
                    btn.textContent = `${h}시간`;
                    btn.onclick = () => {
                        etpHours = h;
                        updateExtraTimePickerUI();
                    };
                    hoursGrid.appendChild(btn);
                }
            }

            const minutesGrid = document.getElementById('etpMinutesGrid');
            if (minutesGrid) {
                minutesGrid.innerHTML = '';
                const minOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
                minOptions.forEach(m => {
                    const btn = document.createElement('button');
                    const isSel = (etpMins === m);
                    const mStr = String(m).padStart(2, '0');
                    btn.className = isSel
                        ? "py-1.5 rounded-lg font-bold bg-indigo-600 text-white transition text-xs"
                        : "py-1.5 rounded-lg font-medium bg-slate-100 hover:bg-indigo-50 text-slate-700 transition text-xs";
                    btn.textContent = `${mStr}분`;
                    btn.onclick = () => {
                        etpMins = m;
                        updateExtraTimePickerUI();
                    };
                    minutesGrid.appendChild(btn);
                });
            }
        }

        function applyExtraTimeSelection() {
            let finalStr = "";
            if (etpHours === 0 && etpMins === 0) {
                finalStr = "";
            } else {
                let parts = [];
                if (etpHours > 0) parts.push(`${etpHours}시간`);
                if (etpMins > 0) parts.push(`${etpMins}분`);
                finalStr = parts.join(" ");
            }

            if (!workData[selectedDateKey]) workData[selectedDateKey] = {};
            workData[selectedDateKey].extraTime = finalStr;

            const extraInput = document.getElementById('extraTimeInput');
            if (extraInput) extraInput.value = finalStr;

            isUserEditingOutput = false;
            saveData();
            closeExtraTimePickerModal();
        }

        function openTimePickerModal(eventIdx) {
            tpActiveEventIdx = eventIdx;
            const ev = workData[selectedDateKey].events[eventIdx];
            const timeVal = (ev && ev.time) ? ev.time.trim() : '';

            if (timeVal.includes('-') || timeVal.includes('~')) {
                tpMode = 'range';
                const parts = timeVal.split(/[-~]/);
                parseStringToTpState(parts[0] || '', 'start');
                parseStringToTpState(parts[1] || '', 'end');
            } else {
                tpMode = 'single';
                parseStringToTpState(timeVal || 'AM12:00', 'start');
            }

            tpActiveSubTab = 'start';
            updateTimePickerUI();

            document.getElementById('timePickerModal')?.classList.remove('hidden');
        }

        function closeTimePickerModal() {
            document.getElementById('timePickerModal')?.classList.add('hidden');
        }

        function setTimePickerMode(mode) {
            tpMode = mode;
            updateTimePickerUI();
        }

        function setActiveRangeSubTab(tab) {
            tpActiveSubTab = tab;
            updateTimePickerUI();
        }

        function parseStringToTpState(str, targetKey) {
            let s = str.trim().toUpperCase();
            let period = 'AM';
            if (s.includes('PM') || s.includes('오후')) period = 'PM';
            if (s.includes('AM') || s.includes('오전')) period = 'AM';

            let cleanStr = s.replace(/(AM|PM|오전|오후)/gi, '').trim();
            let parts = cleanStr.split(':');
            let hour = 12;
            let min = 0;

            if (parts.length >= 1 && !isNaN(parseInt(parts[0], 10))) {
                hour = parseInt(parts[0], 10);
            }
            if (parts.length >= 2 && !isNaN(parseInt(parts[1], 10))) {
                min = parseInt(parts[1], 10);
            }

            if (hour > 12) hour = 12;
            if (hour < 1) hour = 12;

            min = Math.round(min / 5) * 5;
            if (min >= 60) min = 55;

            tpState[targetKey] = { period, hour, min };
        }

        function formatTpStateToString(st) {
            const mStr = String(st.min).padStart(2, '0');
            return `${st.period}${st.hour}:${mStr}`;
        }

        function updateTimePickerUI() {
            const singleBtn = document.getElementById('tpModeSingleBtn');
            const rangeBtn = document.getElementById('tpModeRangeBtn');
            const rangeTabsContainer = document.getElementById('tpRangeTabsContainer');

            if (tpMode === 'single') {
                singleBtn.className = "py-1 rounded-lg bg-white text-slate-800 font-bold shadow-2xs";
                rangeBtn.className = "py-1 rounded-lg text-slate-500 hover:text-slate-800";
                rangeTabsContainer.classList.add('hidden');
                rangeTabsContainer.classList.remove('grid');
            } else {
                singleBtn.className = "py-1 rounded-lg text-slate-500 hover:text-slate-800";
                rangeBtn.className = "py-1 rounded-lg bg-white text-slate-800 font-bold shadow-2xs";
                rangeTabsContainer.classList.remove('hidden');
                rangeTabsContainer.classList.add('grid');
            }

            const subTabStart = document.getElementById('tpSubTabStart');
            const subTabEnd = document.getElementById('tpSubTabEnd');

            if (tpActiveSubTab === 'start') {
                subTabStart.className = "py-1.5 rounded-xl bg-indigo-50 text-indigo-700 font-bold font-mono text-center border border-indigo-200";
                subTabEnd.className = "py-1.5 rounded-xl bg-slate-50 text-slate-500 font-mono text-center border border-slate-200";
            } else {
                subTabStart.className = "py-1.5 rounded-xl bg-slate-50 text-slate-500 font-mono text-center border border-slate-200";
                subTabEnd.className = "py-1.5 rounded-xl bg-indigo-50 text-indigo-700 font-bold font-mono text-center border border-indigo-200";
            }

            document.getElementById('tpStartPreviewText').textContent = formatTpStateToString(tpState.start);
            document.getElementById('tpEndPreviewText').textContent = formatTpStateToString(tpState.end);

            const livePreviewEl = document.getElementById('tpLivePreview');
            if (livePreviewEl) {
                if (tpMode === 'single') {
                    livePreviewEl.textContent = formatTpStateToString(tpState.start);
                } else {
                    livePreviewEl.textContent = `${formatTpStateToString(tpState.start)}-${formatTpStateToString(tpState.end)}`;
                }
            }

            renderTimePickerGrids();
        }

        function renderTimePickerGrids() {
            const activeKey = (tpMode === 'single') ? 'start' : tpActiveSubTab;
            const currentSt = tpState[activeKey];

            const amBtn = document.getElementById('tpAmBtn');
            const pmBtn = document.getElementById('tpPmBtn');

            if (currentSt.period === 'AM') {
                amBtn.className = "py-1.5 rounded-xl bg-indigo-600 text-white font-bold text-xs";
                pmBtn.className = "py-1.5 rounded-xl bg-slate-100 text-slate-700 font-bold text-xs";
            } else {
                amBtn.className = "py-1.5 rounded-xl bg-slate-100 text-slate-700 font-bold text-xs";
                pmBtn.className = "py-1.5 rounded-xl bg-indigo-600 text-white font-bold text-xs";
            }

            const hoursGrid = document.getElementById('tpHoursGrid');
            if (hoursGrid) {
                hoursGrid.innerHTML = '';
                for (let h = 1; h <= 12; h++) {
                    const btn = document.createElement('button');
                    const isSel = (currentSt.hour === h);
                    btn.className = isSel
                        ? "py-1.5 rounded-lg font-bold bg-indigo-600 text-white transition"
                        : "py-1.5 rounded-lg font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition";
                    btn.textContent = `${h}시`;
                    btn.onclick = () => {
                        tpState[activeKey].hour = h;
                        updateTimePickerUI();
                    };
                    hoursGrid.appendChild(btn);
                }
            }

            const minutesGrid = document.getElementById('tpMinutesGrid');
            if (minutesGrid) {
                minutesGrid.innerHTML = '';
                for (let m = 0; m < 60; m += 5) {
                    const btn = document.createElement('button');
                    const isSel = (currentSt.min === m);
                    const mStr = String(m).padStart(2, '0');
                    btn.className = isSel
                        ? "py-1.5 rounded-lg font-bold bg-indigo-600 text-white transition"
                        : "py-1.5 rounded-lg font-medium bg-slate-100 hover:bg-slate-200 text-slate-700 transition";
                    btn.textContent = `${mStr}분`;
                    btn.onclick = () => {
                        tpState[activeKey].min = m;
                        updateTimePickerUI();
                    };
                    minutesGrid.appendChild(btn);
                }
            }
        }

        function setTimePickerPeriod(period) {
            const activeKey = (tpMode === 'single') ? 'start' : tpActiveSubTab;
            tpState[activeKey].period = period;
            updateTimePickerUI();
        }

        function applyTimePickerSelection() {
            if (tpActiveEventIdx === null) return;

            let finalStr = "";
            if (tpMode === 'single') {
                finalStr = formatTpStateToString(tpState.start);
            } else {
                finalStr = `${formatTpStateToString(tpState.start)}-${formatTpStateToString(tpState.end)}`;
            }

            updateEventField(tpActiveEventIdx, 'time', finalStr);
            renderEventsList();
            closeTimePickerModal();
        }

        function setupEventListeners() {
            document.getElementById('summaryNoteInput')?.addEventListener('input', (e) => {
                if (!workData[selectedDateKey]) workData[selectedDateKey] = {};
                workData[selectedDateKey].summary = e.target.value;
                isUserEditingOutput = false;
                saveData();
            });

            document.getElementById('extraTimeInput')?.addEventListener('input', (e) => {
                if (!workData[selectedDateKey]) workData[selectedDateKey] = {};
                workData[selectedDateKey].extraTime = e.target.value;
                isUserEditingOutput = false;
                saveData();
            });

            document.getElementById('formattedTextOutput')?.addEventListener('input', () => {
                isUserEditingOutput = true;
            });

            document.getElementById('todayBtn')?.addEventListener('click', () => {
                const now = new Date();
                currentDate = new Date(now.getFullYear(), now.getMonth(), 1);
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                selectedDateKey = `${year}-${month}-${day}`;
                isUserEditingOutput = false;
                renderCalendar();
                loadDateData(selectedDateKey);
            });

            document.getElementById('clearDayBtn')?.addEventListener('click', () => {
                delete workData[selectedDateKey];
                isUserEditingOutput = false;
                saveData();
                renderCalendar();
                loadDateData(selectedDateKey);
                showToast("선택한 날짜 데이터가 초기화되었습니다.");
            });
        }

        function copyFormattedReport() {
            const outputEl = document.getElementById('formattedTextOutput');
            if (!outputEl || !outputEl.value) {
                showToast("복사할 보고서 내용이 없습니다.");
                return;
            }

            outputEl.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast("클립보드에 복사되었습니다!");
                } else {
                    navigator.clipboard.writeText(outputEl.value).then(() => {
                        showToast("클립보드에 복사되었습니다!");
                    });
                }
            } catch (err) {
                showToast("복사 권한을 확인해주세요.");
            }
        }

        function escapeHtml(str) {
            return (str || '')
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMessage');
            if (toastMsg) toastMsg.textContent = message;
            
            if (toast) {
                toast.classList.remove('translate-y-16', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');

                setTimeout(() => {
                    toast.classList.remove('translate-y-0', 'opacity-100');
                    toast.classList.add('translate-y-16', 'opacity-0');
                }, 2000);
            }
        }
    </script>
</body>
</html>
